# =============================================================================
# Reusable Docker Build & Push Workflow
# =============================================================================
# Builds production Docker image and pushes to Google Artifact Registry.
# Uses Workload Identity Federation for GCP authentication.
# =============================================================================

name: Docker Build & Push

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name for image tag (e.g., mbe-authentication)"
        required: true
        type: string
      org:
        description: "Organization name"
        required: true
        type: string
      port:
        description: "Service port for health check validation"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      target:
        description: "Docker build target stage"
        required: false
        type: string
        default: "production"
    secrets:
      PKG_READ_TOKEN:
        description: "GitHub Packages read token for scoped packages"
        required: true
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        description: "GCP Workload Identity provider"
        required: true
      GCP_SERVICE_ACCOUNT:
        description: "GCP service account email for pushing images"
        required: true
    outputs:
      image-tag:
        description: "Full image tag that was pushed"
        value: ${{ jobs.build-push.outputs.image-tag }}
      image-digest:
        description: "Image digest"
        value: ${{ jobs.build-push.outputs.image-digest }}

jobs:
  build-push:
    name: Build & Push - ${{ inputs.service-name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.sha-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}

    env:
      REGISTRY: us-central1-docker.pkg.dev
      IMAGE_NAME: medyca-staging/medyca-docker/${{ inputs.service-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.PKG_READ_TOKEN }}
            BUILD_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract SHA tag for deploy
        id: sha-tag
        run: |
          # Output only the SHA-based tag (first tag) for deterministic deploys
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "Deploy tag: ${SHA_TAG}"

      - name: Verify image
        run: |
          echo "Image pushed successfully:"
          echo "  Tags: ${{ steps.meta.outputs.tags }}"
          echo "  Deploy tag: ${{ steps.sha-tag.outputs.tag }}"
          echo "  Digest: ${{ steps.build.outputs.digest }}"
